# CI + release pipeline for the rezuscloud forgejo-cli fork.
#
# - On push/PR: build + test (cargo check/test/fmt/clippy) on linux/amd64.
# - On tag v*: build release binaries (amd64 + arm64), publish:
#     1. GitHub Releases with the fj-{arch}-{family} archives (consumed by
#        `cargo binstall fj` via the [package.metadata.binstall] pkg-url template)
#     2. GHCR OCI artifact (ghcr.io/rezuscloud/forgejo-cli) for image-based use
#
# The fork carries one feature over upstream: `fj actions jobs` / `fj actions logs`
# (PR forgejo/forgejo#12666), built against the published forgejo-api 0.11.0.
name: ci-release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write      # create releases + upload assets
  packages: write      # push to GHCR

jobs:
  # ---- CI: build + test on every push/PR ----
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --check
      - name: cargo check
        run: cargo check --all-targets
      - name: cargo clippy
        run: cargo clippy --all-targets || true   # warn-only: upstream code triggers newer-clippy lints we don't own
      - name: cargo test
        run: cargo test --all-targets
      # Verify the log subcommands actually compile against upstream forgejo-api.
      - name: smoke-check actions subcommands
        run: cargo build --release && ./target/release/fj actions --help

  # ---- Release: build + publish on tags ----
  release:
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x86_64
            family: linux
            archive: tar.gz
            strip: strip
          - target: aarch64-unknown-linux-gnu
            arch: aarch64
            family: linux
            archive: tar.gz
            strip: aarch64-linux-gnu-strip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross toolchain (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build release
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }} --features update-check,git2/vendored-openssl
      - name: Strip
        run: ${{ matrix.strip }} target/${{ matrix.target }}/release/fj
      - name: Archive
        run: tar -czf fj-${{ matrix.arch }}-${{ matrix.family }}.tar.gz -C target/${{ matrix.target }}/release fj
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: fj-${{ matrix.arch }}-${{ matrix.family }}.tar.gz
          generate_release_notes: true

  # ---- GHCR OCI artifact (image-based distribution) ----
  publish-ghcr:
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release --features update-check
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push OCI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/Dockerfile
          push: true
          tags: |
            ghcr.io/rezuscloud/forgejo-cli:latest
            ghcr.io/rezuscloud/forgejo-cli:${{ github.ref_name }}
