name: Bug Report
about: If you've found incorrect behavior or crashes, use this.
labels:
  - Kind/Bug
body:
  - type: textarea
    attributes:
      label: Expected Behavior
      description: Describe what you did and what you expected to happen.
    validations:
      require: true
  - type: textarea
    attributes:
      label: Actual Behavior
      description: Describe what actually happened instead.
    validations:
      require: true
  - type: textarea
    attributes:
      label: Steps to Reproduce
      description: Try to find a sequence of steps that can reproduce the behavior. This is a big help in debugging!
  - type: textarea
    attributes:
      label: "`fj` Version"
      description: If possible, share the output of `fj version --verbose`.
      render: "text"
  - type: input
    attributes:
      label: "Forgejo Version"
      description: The version number of the Forgejo instance you were using.
  - type: checkboxes
    attributes:
      label: Code of Conduct
      description: Contributions are bound by the [Forgejo Code of Conduct](https://codeberg.org/forgejo/code-of-conduct) and [Forgejo AI Agreement](https://codeberg.org/forgejo/governance/src/branch/main/AIAgreement.md). LLM use in any capacity is not permitted.
      options:
        - label: I agree to act in accordance with the CoC & AI Agreement.
          required: true
        - label: This issue was not generated by an LLM, even in part.
          required: true

