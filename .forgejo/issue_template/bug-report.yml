name: Bug Report
about: If you've found incorrect behavior or crashes, use this.
title: 'bug: '
labels:
  - Kind/Bug
body:
  - type: textarea
    attributes:
      label: Problem faced
      description: Please describe the problem you encountered, and what you were doing at the time.
  - type: textarea
    attributes:
      label: Version
      description: If possible, share the output of `fj version --verbose`.
      render: "text"
  - type: checkboxes
    attributes:
      label: Code of Conduct
      description: Contributions are bound by the [Forgejo Code of Conduct](https://codeberg.org/forgejo/code-of-conduct) and [Forgejo AI Agreement](https://codeberg.org/forgejo/governance/src/branch/main/AIAgreement.md). LLM use in any capacity is not permitted.
      options:
        - label: I agree to act in accordance with the CoC & AI Agreement.
          required: true
        - label: This issue was not generated by an LLM, even in part.
          required: true

